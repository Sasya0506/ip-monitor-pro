[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9 && pnpm install --frozen-lockfile=false"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/trademark-app build",
  "pnpm --filter @workspace/api-server build"
]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
